document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n}\n.syn-chart__annotation-line {\n  stroke: var(--syn-ink);\n  stroke-width: 1;\n  stroke-dasharray: 2 3;\n}\n.syn-chart__value-label {\n  font-family: var(--syn-font-body);\n  font-size: 12px;\n  font-weight: var(--syn-weight-bold);\n  fill: var(--syn-ink);\n}\n.syn-chart__legend {\n  display: flex;\n  gap: var(--syn-space-4);\n  margin-top: var(--syn-space-3);\n  font-size: var(--syn-text-caption);\n  color: var(--syn-ink-secondary);\n}\n.syn-chart__legend-item {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n}\n.syn-chart__swatch {\n  width: 12px;\n  height: 12px;\n  display: inline-block;\n}\n.syn-chart__swatch--1 {\n  background: var(--syn-data-1);\n}\n.syn-chart__swatch--2 {\n  background: var(--syn-data-2);\n}\n.syn-chart__swatch--key {\n  background: var(--syn-data-key);\n}\n.syn-section {\n  padding: var(--syn-space-7) 0;\n}\n.syn-mt-2 {\n  margin-top: var(--syn-space-2);\n}\n.syn-mt-3 {\n  margin-top: var(--syn-space-3);\n}\n.syn-mt-4 {\n  margin-top: var(--syn-space-4);\n}\n.syn-mt-5 {\n  margin-top: var(--syn-space-5);\n}\n.syn-mt-6 {\n  margin-top: var(--syn-space-6);\n}\n\n/* src/styles.css */\n\n<\u002Fstyle>\n  <script src=\"f00f50b5-0045-43db-99a1-12a55692f266\"><\u002Fscript>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"SynergyDS.PageShell\" hint-size=\"100%,3600px\" header-meta=\"Pricing Rationale · July 2026\" legal=\"Sold and active data extracted from MLS by SYNERGY, July 13, 2026; believed reliable but not guaranteed. Comparable details paraphrased from MLS records. This analysis is for discussion purposes and is not an appraisal. Not intended to solicit persons already under contract with a brokerage.\">\n\n  <x-import component-from-global-scope=\"SynergyDS.Cover\" hint-size=\"100%,480px\" kicker=\"Pricing Rationale · July 2026\" title=\"How We Arrived at the Number\" subtitle=\"24 Woodstream Blvd #516 · Prepared for Shailindra Singh &amp; Trupti Panchal\" meta=\"Andres Ramirez, REALTOR® · SYNERGY · REAL Broker Ontario Ltd., Brokerage · +1 (416) 616-7991 · andres@synergysold.ca\">\n  <\u002Fx-import>\n\n  <!-- 01 · THE EVIDENCE: SOLDS -->\n  <x-import component-from-global-scope=\"SynergyDS.Container\" hint-size=\"100%,900px\">\n    <div style=\"padding:64px 0 32px\">\n    <x-import component-from-global-scope=\"SynergyDS.Eyebrow\" hint-size=\"auto,20px\">01 · What Actually Sold<\u002Fx-import>\n    <x-import component-from-global-scope=\"SynergyDS.Heading\" level=\"{{ three }}\" hint-size=\"100%,48px\">Every 1-bed &amp; 1+1 sale within 3.2 km since May 1<\u002Fx-import>\n    <x-import component-from-global-scope=\"SynergyDS.Rule\" hint-size=\"100%,2px\"><\u002Fx-import>\n    <div style=\"max-width:860px;margin:24px 0 28px\">\n      <x-import component-from-global-scope=\"SynergyDS.Text\" hint-size=\"100%,60px\">Five sales. That's the entire market for this unit type in ten weeks — every one sold <b>below asking<\u002Fb>, at 91–97% of list. The spread is wide because the buildings are not equal: fees, age, and finish drive the per-square-foot number as much as size does.<\u002Fx-import>\n    <\u002Fdiv>\n    <x-import component-from-global-scope=\"SynergyDS.DataTable\" hint-size=\"100%,380px\" columns=\"{{ soldCols }}\" rows=\"{{ soldRows }}\" source=\"MLS sold records, May 1 – July 13, 2026 · 3.2 km radius · condo apartments, 1 bed and 1+1\"><\u002Fx-import>\n    <div style=\"margin-top:28px\">\n      <x-import component-from-global-scope=\"SynergyDS.Callout\" hint-size=\"100%,110px\" label=\"What the solds say\">Woodstream/Allegra product trades at roughly <b>$690–745 per sq ft<\u002Fb>. The two outliers explain themselves: $601K bought a 2017 build with a $425 fee; $470K bought a $781 monthly fee. The cleanest functional match to your unit — a renovated 760 sq ft 1+1 with one bath at 281 Woodbridge — sold for <b>$536,000 in 12 days<\u002Fb>.<\u002Fx-import>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fx-import>\n\n  <!-- 02 · THE COMPETITION -->\n  <x-import component-from-global-scope=\"SynergyDS.Container\" hint-size=\"100%,900px\">\n    <div style=\"padding:48px 0 32px\">\n    <x-import component-from-global-scope=\"SynergyDS.Eyebrow\" hint-size=\"auto,20px\">02 · Who You'd Be Selling Against<\u002Fx-import>\n    <x-import component-from-global-scope=\"SynergyDS.Heading\" level=\"{{ three }}\" hint-size=\"100%,48px\">The active shelf, cheapest to dearest<\u002Fx-import>\n    <x-import component-from-global-scope=\"SynergyDS.Rule\" hint-size=\"100%,2px\"><\u002Fx-import>\n    <div style=\"max-width:860px;margin:24px 0 28px\">\n      <x-import component-from-global-scope=\"SynergyDS.Text\" hint-size=\"100%,60px\">Twelve actives in the radius; these are the seven a buyer will actually cross-shop against you. Days on market is the tell — everything asking $549,900 or more in an ordinary building has been sitting for two months or longer.<\u002Fx-import>\n    <\u002Fdiv>\n    <x-import component-from-global-scope=\"SynergyDS.DataTable\" hint-size=\"100%,420px\" columns=\"{{ activeCols }}\" rows=\"{{ activeRows }}\" source=\"MLS active listings, pulled July 13, 2026 · 3.2 km radius · closest competitors to a 1+1 shown\"><\u002Fx-import>\n    <div style=\"margin-top:28px;max-width:860px\">\n      <x-import component-from-global-scope=\"SynergyDS.Text\" hint-size=\"100%,60px\">Note the two units in your own complex: <b>#208 downstairs at $488,800<\u002Fb> is smaller (620 sq ft, no den, 2nd floor) and fresh to market. <b>#315 at $579,000 and #520 next door at $549,900<\u002Fb> are both bigger two-bath units — and both have sat unsold for 2–3 months. The market has bracketed your floor plan from both sides.<\u002Fx-import>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fx-import>\n\n  <!-- 03 · THE ADJUSTMENT LOGIC -->\n  <x-import component-from-global-scope=\"SynergyDS.Container\" hint-size=\"100%,800px\">\n    <div style=\"padding:48px 0 32px\">\n    <x-import component-from-global-scope=\"SynergyDS.Eyebrow\" hint-size=\"auto,20px\">03 · The Adjustment Logic<\u002Fx-import>\n    <x-import component-from-global-scope=\"SynergyDS.Heading\" level=\"{{ three }}\" hint-size=\"100%,48px\">From the comps to your unit<\u002Fx-import>\n    <x-import component-from-global-scope=\"SynergyDS.Rule\" hint-size=\"100%,2px\"><\u002Fx-import>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-top:32px\">\n      <x-import component-from-global-scope=\"SynergyDS.StatCard\" hint-size=\"100%,140px\" value=\"$547.5K\" label=\"#710, your building, March — but it had 2 baths and 791 sq ft. Adjust down ≈$15–20K for the single bath.\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"SynergyDS.StatCard\" hint-size=\"100%,140px\" value=\"$536K\" label=\"281 Woodbridge #444, May — 760 sq ft, 1+1, 1 bath, renovated. Closest match; sold in 12 days at $705/sq ft.\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"SynergyDS.StatCard\" hint-size=\"100%,140px\" value=\"$478K\" label=\"12 Woodstream #919, June — same complex but ~110 sq ft smaller, no den. Your size premium: ≈$50–60K.\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"max-width:860px;margin-top:32px\">\n      <x-import component-from-global-scope=\"SynergyDS.Text\" hint-size=\"100%,90px\">Three independent routes converge on the same band: <b>#710 minus the bath ≈ $528–533K<\u002Fb>. <b>#444's $705/sq ft on your ~750 sq ft ≈ $529K<\u002Fb>, plus a nudge for your locker and south exposure. <b>#919 plus your size and den ≈ $528–538K<\u002Fb>. Your owned parking <i>and<\u002Fi> locker (the March benchmark had no locker), 5th-floor south exposure with a balcony walk-out, and the Allegra amenity set support the top of that band — the single bathroom is what caps it.<\u002Fx-import>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fx-import>\n\n  <!-- 04 · THE RECOMMENDATION -->\n  <x-import component-from-global-scope=\"SynergyDS.Container\" hint-size=\"100%,750px\">\n    <div style=\"padding:48px 0 96px\">\n    <x-import component-from-global-scope=\"SynergyDS.Eyebrow\" hint-size=\"auto,20px\">04 · The Recommendation<\u002Fx-import>\n    <x-import component-from-global-scope=\"SynergyDS.Heading\" level=\"{{ three }}\" hint-size=\"100%,48px\">List at $529,900<\u002Fx-import>\n    <x-import component-from-global-scope=\"SynergyDS.Rule\" hint-size=\"100%,2px\"><\u002Fx-import>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-top:32px\">\n      <x-import component-from-global-scope=\"SynergyDS.StatCard\" hint-size=\"100%,140px\" is-key=\"{{ yes }}\" value=\"$529,900\" label=\"recommended list price · ≈$707/sq ft\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"SynergyDS.StatCard\" hint-size=\"100%,140px\" value=\"$520–535K\" label=\"expected sale range at this ask, on current absorption\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"SynergyDS.StatCard\" hint-size=\"100%,140px\" value=\"~30 days\" label=\"target exposure — the well-priced comps sold in 12–42 days\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:16px;max-width:860px;margin-top:36px\">\n      <x-import component-from-global-scope=\"SynergyDS.Text\" hint-size=\"100%,50px\"><b>Why it gets people in.<\u002Fb> At $529,900 you are the only 1+1 with parking <i>and<\u002Fi> locker under $549,900 in the entire radius — $20,000 under the two-bath unit next door and $49,100 under the one upstairs. On the portals you capture every search capped at $530K and $550K. That's the showing traffic the stale listings aren't getting.<\u002Fx-import>\n      <x-import component-from-global-scope=\"SynergyDS.Text\" hint-size=\"100%,50px\"><b>Why it isn't below market.<\u002Fb> It sits $52K above the same-complex June sale ($478K) — fully justified by your extra ~110 sq ft, den, and locker — and lands exactly where the bath-adjusted March benchmark and the $705/sq ft May sale both point. Well-priced units here have been closing at 96–97% of ask; hope-priced ones surrender 4–9% after months of cuts. Pricing at the evidence, not above it, is how you keep the negotiation at your number.<\u002Fx-import>\n      <x-import component-from-global-scope=\"SynergyDS.Text\" hint-size=\"100%,50px\"><b>The guardrail.<\u002Fb> If showings run hot in week one, we hold firm and let competition do the work; the ask leaves room to close at or near list. If the unit's condition surprises us on the tour — better or worse — the number moves with it before launch, not after.<\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"margin-top:36px\">\n      <x-import component-from-global-scope=\"SynergyDS.Callout\" hint-size=\"100%,110px\" label=\"The one-line version\">The market has already told us what this floor plan is worth — $536K renovated in May, $547.5K with a second bath in March, $478K without your size in June. <b>$529,900 is the number that makes you the obvious next sale instead of the fourth listing waiting its turn.<\u002Fb><\u002Fx-import>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fx-import>\n\n<\u002Fx-import>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1280 }\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      three: 3,\n      yes: true,\n      soldCols: [\n        { key: 'addr', label: 'Address' },\n        { key: 'spec', label: 'Layout' },\n        { key: 'sqft', label: 'Sq ft', numeric: true },\n        { key: 'fee', label: 'Fee/mo', numeric: true },\n        { key: 'sold', label: 'Sold', numeric: true },\n        { key: 'ppsf', label: '$/sq ft', numeric: true },\n        { key: 'dom', label: 'DOM', numeric: true },\n        { key: 'when', label: 'Closed' },\n      ],\n      soldRows: [\n        { addr: React.createElement('b', null, '12 Woodstream Blvd #919 · your complex'), spec: '1 bed · 1 bath', sqft: '642', fee: '$488', sold: '$478,000', ppsf:
